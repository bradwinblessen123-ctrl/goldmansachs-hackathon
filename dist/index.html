owing your personal risk tolerance — is essential to building a portfolio you can stick with through market volatility."},{id:5,title:"Module Assessment",type:"quiz",duration:"8 min",completed:!1,questions:[{question:"What is the primary risk of keeping all your savings in a low-interest bank account?",options:["Bank failure","Inflation eroding purchasing power","High fees","Government seizure"],correct:1},{question:"Which asset class typically offers the highest potential long-term returns but also the highest risk?",options:["Cash","Government bonds","Stocks","Money market funds"],correct:2},{question:"Stock prices rise when:",options:["The company pays dividends","More people want to buy than sell","Interest rates are high","The government prints more money"],correct:1},{question:'The "risk/return tradeoff" means:',options:["Lower risk always means better returns","Higher potential returns require accepting higher risk","Risk can be eliminated with diversification","Return is unpredictable regardless of risk"],correct:1},{question:"Which of the following best describes compound interest?",options:["Interest paid on the original amount only","A fixed annual fee","Earning interest on both principal and previously earned interest","A government bond rate"],correct:2}]}]},{id:"markets-101",title:"Understanding Financial Markets",category:"Markets",level:"Beginner",duration:"3 hours",moduleCount:5,creditsOnCompletion:50,certificate:"Certificate in Financial Markets",description:"Learn how global financial markets work, what drives stock prices, and how macroeconomic events like Fed decisions and inflation affect your investments.",color:"#003D7A",modules:[{id:1,title:"The Federal Reserve and You",type:"video",duration:"12 min",completed:!1,content:"The Federal Reserve sets the interest rate that ripples through the entire economy — affecting your mortgage, car loan, and investment returns. This module explains how Fed decisions translate into real impacts on your portfolio."},{id:2,title:"Reading Market Indices",type:"reading",duration:"10 min",completed:!1,content:"The S&P 500, Dow Jones, and Nasdaq are the three main benchmarks investors use to track the US stock market. Each measures different things: the S&P 500 represents the 500 largest companies; the Dow tracks 30 iconic companies; the Nasdaq weights technology heavily."},{id:3,title:"Bull Markets, Bear Markets, and Corrections",type:"video",duration:"9 min",completed:!1,content:"Markets move in cycles. A bull market is a period of rising prices (typically 20%+ gains from a low). A bear market is a decline of 20% or more. A correction is a 10–20% drop. Understanding these cycles helps you stay calm and make rational decisions during volatility."},{id:4,title:"How Inflation Affects Investments",type:"reading",duration:"11 min",completed:!1,content:"Inflation — the general rise in prices over time — is one of the biggest threats to wealth preservation. It erodes the real value of cash and fixed-income investments, while stocks and real assets often provide a natural hedge."},{id:5,title:"Markets Assessment",type:"quiz",duration:"8 min",completed:!1,questions:[{question:'What defines a "bear market"?',options:["A 5% decline from a peak","A 10% decline from a peak","A 20% or greater decline from a peak","Any day the market closes lower"],correct:2},{question:"When the Federal Reserve raises interest rates, what typically happens to bond prices?",options:["They rise","They fall","They stay the same","They become more volatile"],correct:1},{question:"Which index is most representative of the overall US stock market?",options:["Dow Jones Industrial Average","S&P 500","Nasdaq Composite","Russell 2000"],correct:1},{question:"Inflation is most harmful to which type of investment?",options:["Stocks","Real estate","Cash savings","Commodities"],correct:2},{question:'What does "basis point" mean?',options:["One percentage point (1%)","One-tenth of a percent (0.1%)","One-hundredth of a percent (0.01%)","One thousand dollars"],correct:2}]}]},{id:"portfolio-construction",title:"Building a Resilient Portfolio",category:"Wealth Management",level:"Intermediate",duration:"4 hours",moduleCount:6,creditsOnCompletion:100,certificate:"Certificate in Portfolio Construction",description:"Go beyond individual stocks and learn how professional portfolio managers think about diversification, asset allocation, and building a mix of investments that can withstand market turbulence.",color:"#0047B3",modules:[{id:1,title:"Modern Portfolio Theory",type:"video",duration:"14 min",completed:!1,content:`Nobel Prize-winning economist Harry Markowitz showed that you can reduce portfolio risk without sacrificing returns by combining assets that don't move in lockstep. This "efficient frontier" concept is the foundation of professional portfolio construction.`},{id:2,title:"Strategic Asset Allocation",type:"reading",duration:"15 min",completed:!1,content:"Asset allocation — how you divide your portfolio among stocks, bonds, and cash — is the single biggest driver of long-term returns, accounting for roughly 90% of portfolio performance according to academic research. This module shows you how to determine the right allocation for your goals."},{id:3,title:"Diversification in Practice",type:"video",duration:"11 min",completed:!1,content:"True diversification means owning assets that respond differently to economic conditions. Domestic stocks, international stocks, bonds, and real estate often move independently — combining them reduces portfolio volatility without giving up expected returns."},{id:4,title:"Rebalancing Strategies",type:"reading",duration:"12 min",completed:!1,content:"Over time, strong performers grow to dominate your portfolio, increasing risk beyond your target. Rebalancing — systematically selling winners and buying laggards — restores your target allocation and forces you to buy low and sell high."},{id:5,title:"Tax-Efficient Investing",type:"video",duration:"13 min",completed:!1,content:"Taxes are the largest avoidable drag on investment returns. Tax-loss harvesting, asset location (which accounts hold which investments), and understanding capital gains treatment can add 0.5–1.5% to your annual after-tax returns."},{id:6,title:"Portfolio Construction Assessment",type:"quiz",duration:"10 min",completed:!1,questions:[{question:"What percentage of portfolio performance does academic research attribute to asset allocation?",options:["About 30%","About 50%","About 70%","About 90%"],correct:3},{question:"What is the primary goal of portfolio rebalancing?",options:["Maximizing returns","Minimizing taxes","Maintaining your target risk level","Increasing diversification"],correct:2},{question:"Tax-loss harvesting involves:",options:["Avoiding all taxable accounts","Selling losing positions to offset gains","Holding investments for exactly one year","Investing only in tax-exempt bonds"],correct:1},{question:'What does "correlation" mean in portfolio construction?',options:["The interest rate on a bond","How closely two assets move together","The total return of a portfolio","A measure of company earnings"],correct:1}]}]},{id:"fixed-income",title:"Fixed Income & Bonds",category:"Markets",level:"Intermediate",duration:"3.5 hours",moduleCount:5,creditsOnCompletion:100,certificate:"Certificate in Fixed Income",description:"Master the bond market — the world's largest securities market — and learn how to use fixed-income instruments to generate income, reduce risk, and balance an equity portfolio.",color:"#005080",modules:[{id:1,title:"What is a Bond?",type:"video",duration:"10 min",completed:!1,content:'A bond is a loan you make to a government or corporation. In exchange, they pay you regular interest (the "coupon") and return your principal at maturity. Bonds are the backbone of conservative investing and the default safe-haven asset.'},{id:2,title:"Types of Bonds",type:"reading",duration:"14 min",completed:!1,content:"The bond market encompasses US Treasuries (backed by the US government), corporate bonds (issued by companies), municipal bonds (tax-advantaged, issued by states/cities), and international bonds. Each has different risk, return, and tax characteristics."},{id:3,title:"Yield, Duration, and Price",type:"video",duration:"12 min",completed:!1,content:"Bond yield is the annualized return you earn if you hold the bond to maturity. Duration measures how sensitive a bond's price is to interest rate changes. Understanding these concepts is essential — a 10-year bond can lose 8–10% of its value if rates rise 1%."},{id:4,title:"Reading the Yield Curve",type:"reading",duration:"13 min",completed:!1,content:"The yield curve charts interest rates across different maturities. A normal curve slopes upward (long-term rates higher than short-term). An inverted yield curve — when short-term rates exceed long-term — has preceded every US recession since 1955."},{id:5,title:"Fixed Income Assessment",type:"quiz",duration:"8 min",completed:!1,questions:[{question:'What is a bond "coupon"?',options:["A discount at maturity","The regular interest payment to bondholders","The bond's credit rating","The bond's maturity date"],correct:1},{question:"If interest rates rise by 1%, what happens to existing bond prices?",options:["They rise","They fall","They stay the same","Only government bonds fall"],correct:1},{question:"An inverted yield curve typically signals:",options:["Strong economic growth ahead","Potential recession risk","Stock market peak","Currency devaluation"],correct:1},{question:"Which type of bond offers tax advantages at the federal level?",options:["Corporate bonds","Treasury bonds","Municipal bonds","Junk bonds"],correct:2}]}]},{id:"risk-management",title:"Risk Management & Protection",category:"Risk & Protection",level:"Intermediate",duration:"3 hours",moduleCount:5,creditsOnCompletion:100,certificate:"Certificate in Risk Management",description:"Learn how institutional investors measure, monitor, and protect against portfolio risk — and apply the same principles to your personal investments.",color:"#004A40",modules:[{id:1,title:"Measuring Portfolio Risk",type:"video",duration:"11 min",completed:!1,content:"Volatility (standard deviation) measures how much your portfolio fluctuates. Maximum drawdown shows the worst loss from peak to trough. Beta measures how much your portfolio moves relative to the market. These metrics help you understand your true risk exposure."},{id:2,title:"Concentration Risk",type:"reading",duration:"10 min",completed:!1,content:"Concentration risk is the danger of having too much of your portfolio in a single stock, sector, or asset class. Professional guidelines suggest no single position should exceed 5–7% of your portfolio. Tech concentration (your portfolio currently runs ~55% tech) amplifies gains but also losses."},{id:3,title:"Scenario Analysis",type:"video",duration:"12 min",completed:!1,content:"Scenario analysis tests how your portfolio would perform under specific adverse conditions: a 2008-style crash (-50%), 1970s inflation, a tech sector collapse, or a sudden need to liquidate. Running these simulations helps you understand real-world risk before it materializes."},{id:4,title:"Defensive Strategies",type:"reading",duration:"11 min",completed:!1,content:"Defensive investments — bonds, dividend stocks, gold, cash — tend to hold their value better during downturns. Professional investors maintain minimum allocations to defensive assets to cushion against bear markets, even when equities are performing well."},{id:5,title:"Risk Management Assessment",type:"quiz",duration:"8 min",completed:!1,questions:[{question:'What does "maximum drawdown" measure?',options:["The highest return in a year","The worst peak-to-trough loss","Average annual volatility","The beta of a portfolio"],correct:1},{question:'A portfolio "beta" of 1.5 means:',options:["The portfolio is 50% in bonds","The portfolio moves 1.5x the market","The portfolio has no correlation to the market","The portfolio is 50% less volatile"],correct:1},{question:"What is the professional guideline for maximum single-stock concentration?",options:["1–2% of portfolio","5–7% of portfolio","10–15% of portfolio","No limit if the stock is strong"],correct:1}]}]},{id:"advanced-strategies",title:"Advanced Investment Strategies",category:"Advanced",level:"Advanced",duration:"5 hours",moduleCount:6,creditsOnCompletion:150,certificate:"Certificate in Advanced Investment Strategies",description:"A Goldman Sachs-standard deep dive into factor investing, derivatives, alternative assets, and the quantitative techniques used by institutional investors.",color:"#2D1B69",modules:[{id:1,title:"Factor Investing",type:"video",duration:"15 min",completed:!1,content:"Factor investing exploits systematic drivers of return: value (cheap vs. expensive), momentum (recent winners continue), quality (profitable stable businesses), and size (small caps outperform over long periods). Academic research shows these factors have delivered consistent risk-adjusted returns over decades."},{id:2,title:"Introduction to Derivatives",type:"reading",duration:"18 min",completed:!1,content:"Derivatives — options and futures — are instruments whose value derives from an underlying asset. Options give the right (but not obligation) to buy or sell at a set price. Used properly, they can hedge portfolio risk; used recklessly, they can amplify losses exponentially."},{id:3,title:"Alternative Assets",type:"video",duration:"14 min",completed:!1,content:"Alternatives — private equity, hedge funds, real estate, commodities — have low correlation to public markets, providing diversification benefits. Historically restricted to institutional investors, many are now accessible to retail investors through ETFs and fund structures."},{id:4,title:"Quantitative Analysis",type:"reading",duration:"16 min",completed:!1,content:"Quantitative investing uses mathematical models and data analysis to make investment decisions. From simple moving averages to complex machine learning models, quant techniques help identify patterns and manage risk systematically."},{id:5,title:"ESG Investing",type:"video",duration:"12 min",completed:!1,content:"Environmental, Social, and Governance (ESG) investing incorporates non-financial factors into investment analysis. Evidence is mixed on whether ESG improves returns, but it clearly affects risk — companies with poor governance or environmental practices face increasing regulatory and reputational risks."},{id:6,title:"Advanced Strategies Assessment",type:"quiz",duration:"12 min",completed:!1,questions:[{question:'In factor investing, the "value factor" refers to:',options:["Investing in the most expensive stocks","Investing in stocks trading below intrinsic value","Investing in fast-growing companies","Investing in government bonds"],correct:1},{question:"An options contract gives the buyer:",options:["Obligation to buy shares at any price","Right, but not obligation, to buy/sell at a set price","Guaranteed positive return","Ownership in the underlying company"],correct:1},{question:"Why do alternative assets add value to a portfolio?",options:["They always outperform stocks","They have low correlation to public markets","They are government-guaranteed","They pay high dividends"],correct:1}]}]}],na={name:"Alex Chen",riskProfile:"Balanced",goal:"Long-term wealth growth",targetYear:2045,creditsEarned:150,creditsAvailable:50},St=[{symbol:"AAPL",name:"Apple Inc.",type:"stock",sector:"Technology",shares:85,avgCost:177.05,currentPrice:210.25,dividendsReceived:187,priorDayPrice:207.83,signal:"golden-cross",taxLossOpportunity:!1,activity:[{type:"buy",date:"2024-01-12",shares:20,price:182,note:"Added on pullback"},{type:"div",date:"2024-02-15",amount:81,note:"Q1 dividend"},{type:"buy",date:"2023-10-03",shares:65,price:174.91,note:"Initial position"},{type:"div",date:"2023-11-16",amount:60,note:"Q4 dividend"}]},{sym  interest rates to slow borrowing and spending — like pumping the brakes on a car going too fast.",videoTitle:"How the Federal Reserve Works - Khan Academy",relatedTerms:["interest-rates","monetary-policy","quantitative-easing","inflation","basis-points"],learnMoreCourse:"markets-101"},"interest-rates":{term:"Interest Rates",simple:"The cost of borrowing money, expressed as a percentage. When rates are high, loans cost more. When rates are low, borrowing is cheap and people spend more.",bullets:["Set by the Federal Reserve for benchmark short-term rates; longer-term rates are set by bond markets","Affect mortgage rates, car loans, credit cards, and savings account yields","Higher rates slow economic growth by making borrowing expensive; lower rates stimulate spending","Bond prices move inversely to interest rates — when rates rise, existing bond prices fall","Central banks worldwide coordinate rate decisions to manage global economic conditions"],example:"If the Fed raises rates from 3% to 5%, a $300,000 mortgage monthly payment jumps by roughly $360 — directly impacting how much house you can afford.",videoTitle:"Interest Rates Explained Simply",relatedTerms:["federal-reserve","bond","monetary-policy","inflation","yield"],learnMoreCourse:"markets-101"},inflation:{term:"Inflation",simple:"Inflation is the general rise in prices over time, which means your money buys less than it used to. A 5% inflation rate means something that cost $100 now costs $105 a year later.",bullets:["Measured by the Consumer Price Index (CPI) and Personal Consumption Expenditures (PCE)","The Fed targets 2% annual inflation as the sweet spot for a healthy economy","Caused by too much money chasing too few goods, supply chain disruptions, or rising wages","Erodes the purchasing power of cash savings held in low-interest accounts","Moderate inflation is normal and healthy; hyperinflation (>50%/month) is devastating"],example:"If inflation averages 3% per year, $10,000 in a mattress today will only buy $7,374 worth of goods in 10 years — a 26% loss in real value without touching the money.",videoTitle:"Inflation Explained: Why Prices Keep Rising",relatedTerms:["federal-reserve","interest-rates","monetary-policy","quantitative-easing","bond"],learnMoreCourse:"markets-101"},"basis-points":{term:"Basis Points (bps)",simple:"A basis point is one one-hundredth of a percentage point (0.01%). Financial professionals use basis points to describe small changes in interest rates or yields precisely.",bullets:["100 basis points = 1 percentage point","25 basis points = 0.25% — a common increment for Fed rate changes",'Used to avoid ambiguity: "rates rose 50 basis points" is clearer than "rates rose 0.5%"',"Critical in bond markets where small yield differences translate to large dollar amounts","Expense ratios are often quoted in basis points (e.g., 4 bps = 0.04%)"],example:'When the Fed "hikes rates by 75 basis points," it raises the benchmark rate by 0.75%. On a $1 million bond portfolio, 75 bps in yield change can mean $7,500 in annual income difference.',relatedTerms:["interest-rates","federal-reserve","yield","expense-ratio"]},"market-cap":{term:"Market Capitalization",simple:"Market cap is the total value the stock market assigns to a company. It is calculated by multiplying the share price by the total number of shares outstanding.",bullets:["Formula: Share Price × Total Shares = Market Cap","Large-cap: over $10 billion (Apple, Microsoft, Google)","Mid-cap: $2 billion to $10 billion","Small-cap: under $2 billion — higher growth potential but more volatile","Market cap is not the same as a company's revenue or profit — it reflects investor sentiment about future value"],example:"Apple has ~15.4 billion shares and a price of ~$210. Market cap = $210 × 15.4B = ~$3.2 trillion, making it the world's most valuable public company.",relatedTerms:["stock","pe-ratio","earnings","sp500"],learnMoreCourse:"stock-market-101"},dividend:{term:"Dividend",simple:"A dividend is a cash payment companies make to shareholders, typically from their profits. It is like receiving rent income from owning a share of the business.",bullets:["Usually paid quarterly; expressed as an annual dollar amount per share or as a yield percentage","Dividend yield = Annual dividend per share ÷ Share price",'Companies like Johnson & Johnson and Coca-Cola are famous "dividend aristocrats" that have raised dividends for 25+ consecutive years',"Not all companies pay dividends — fast-growing tech firms often reinvest profits instead",'Dividends are taxed differently than capital gains — often at preferential "qualified dividend" rates'],example:"If Apple pays $0.96/share annually and you own 100 shares, you receive $96 per year just for holding the stock — regardless of whether the price goes up or down.",videoTitle:"Dividend Investing for Beginners",relatedTerms:["yield","stock","capital-gains","portfolio"],learnMoreCourse:"investing-fundamentals"},yield:{term:"Yield",simple:"Yield is the income an investment generates, expressed as a percentage of its price. It tells you how much return you get per dollar invested from dividends or interest payments.",bullets:["Dividend yield = Annual dividends ÷ Stock price × 100","Bond yield = Annual coupon payment ÷ Bond price × 100","Yield and price move in opposite directions for bonds — if you pay more for a bond, your yield drops","The 10-year Treasury yield is a key benchmark for mortgage rates and economic health","High yield can signal higher risk — junk bonds pay more because default risk is higher"],example:"A bond paying $50/year that you bought for $1,000 has a 5% yield. If bond prices fall to $800 in the market, that same $50 payment now represents a 6.25% yield for new buyers.",relatedTerms:["bond","dividend","interest-rates","expense-ratio"],learnMoreCourse:"fixed-income-bonds"},portfolio:{term:"Portfolio",simple:"Your portfolio is the complete collection of all your investments — stocks, bonds, ETFs, cash, and any other assets you own. Think of it as your investment basket.",bullets:["A well-constructed portfolio balances different asset types to manage risk and grow wealth","Your portfolio's performance is measured against benchmarks like the S&P 500","Monitoring your portfolio helps ensure it stays aligned with your goals and risk tolerance","Portfolios are personal — two investors with the same goal may have very different optimal mixes","Modern portfolio theory (MPT) shows how combining assets can reduce risk without sacrificing returns"],example:"Alex's portfolio holds AAPL (13%), MSFT (13%), SPY (18%), BND (7%), NVDA (10%), and cash — a mix designed for long-term growth with some downside protection.",relatedTerms:["diversification","asset-allocation","rebalancing","risk-tolerance"],learnMoreCourse:"portfolio-construction"},diversification:{term:"Diversification",simple:"Diversification means spreading your money across different investments so one bad performer does not sink your whole portfolio. It is the financial equivalent of not putting all your eggs in one basket.",bullets:["Reduces unsystematic risk — the risk specific to one company or sector","Cannot eliminate systematic risk — market-wide crashes affect all stocks","Achieved across asset classes (stocks, bonds, real estate), geographies, and sectors","Index funds provide instant diversification — one purchase = ownership in hundreds of companies","Academic research shows most benefits of diversification are captured with 20–30 stocks"],example:"During COVID-19, travel stocks dropped 60%+ while tech stocks surged. A diversified investor holding both saw much smaller losses than one who owned only airlines.",relatedTerms:["portfolio","asset-allocation","index-fund","risk-tolerance","etf"],learnMoreCourse:"portfolio-construction"},"asset-allocation":{term:"Asset Allocation",simple:"Asset allocation is how you divide your money between different categories of investments — typically stocks, bonds, and cash. The right mix depends on your age, goals, and risk tolerance.",bullets:["Classic rule of thumb: hold your age in bonds (e.g., 35 years old = 35% bonds)","Stocks provide growth; bonds provide stability; cash provides liquidity","A common balanced allocation is 60% stocks / 40% bonds","Target-date funds automatically shift allocation to become more conservative as you age","Asset allocation, not individual stock selection, determines ~90% of long-term portfolio returns"],example:"A 30-year-old aggressive investor might choose 90% stocks / 10% bonds. The same person at age 60, near retirement, might shift to 50/50 to protect accumulated wealth.",relatedTerms:["diversification","rebalancing","risk-tolerance","bond","stock"],learnMoreCourse:"portfolio-construction"},stock:{term:"Stock",simple:"A stock (or share) represents a tiny ownership stake in a company. When the company grows and profits, your stake becomes more valuable. When it struggles, your stake loses value.",bullets:["Stocks are traded on exchanges like the NYSE and Nasdaq during market hours","Stockholders can receive dividends and vote on major company decisions","Common stock vs. preferred stock: preferred gets priority for dividends but fewer voting rights","Stock price reflects market consensus on a company's future earnings potential","Historically, US stocks return ~10% annually on average over long periods, but with significant yearly swings"],example:"Buying 10 shares of Apple at $200 means you own a tiny fraction of one of the world's largest companies. If Apple rises to $220, your investment is worth $2,200 — a 10% gain.",videoTitle:"What is a Stock? Stocks for Beginners",relatedTerms:["market-cap","dividend","pe-ratio","etf","portfolio"],learnMoreCourse:"stock-market-101"},bond:{term:"Bond",simple:"A bond is a loan you make to a government or company. They pay you back with interest over a set period. Bonds are generally safer than stocks but offer lower returns.",bullets:["Key terms: face value (amount loaned), coupon (interest rate), maturity date (when you get paid back)","US Treasury bonds are considered the safest investment in the world — backed by the US government","Corporate bonds pay higher interest than government bonds because companies can default","Bond prices fall when interest rates rise (and vice versa) — an important relationship for investors","Bonds act as a portfolio cushion: they often rise when stocks fall"],example:"You buy a 10-year Treasury bond for $1,000 with a 4% coupon. Every year you receive $40 in interest. After 10 years, you get your $1,000 back — plus $400 in total interest earned.",videoTitle:"Bond Investing Explained Simply",relatedTerms:["yield","interest-rates","etf","asset-allocation","inflation"],learnMoreCourse:"fixed-income-bonds"},etf:{term:"ETF (Exchange-Traded Fund)",simple:"An ETF is a basket of many investments packaged into one tradeable security. Buying one ETF share gives you exposure to dozens or hundreds of stocks or bonds at once.",bullets:["Trades on stock exchanges throughout the day, just like individual stocks","Usually tracks an index (like the S&P 500) passively — no fund manager picking stocks","Very low expense ratios — often 0.03% to 0.20% annually vs. 1%+ for actively managed funds","Highly tax-efficient due to the way shares are created and redeemed","Over 8,000 ETFs exist covering every asset class, sector, country, and investment strategy"],example:"SPY is the most traded ETF in the world. One share of SPY gives you proportional ownership in all 500 companies in the S&P 500, for an annual fee of just 0.0945%.",videoTitle:"ETFs Explained for Beginners",relatedTerms:["index-fund","mutual-fund","expense-ratio","diversification","sp500"],learnMoreCourse:"investing-fundamentals"},"mutual-fund":{term:"Mutual Fund",simple:"A mutual fund pools money from many investors to buy a diversified collection of stocks, bonds, or other assets managed by a professional fund manager.",bullets:["Priced once per day after market close, unlike ETFs which trade continuously","Actively managed funds have professional managers trying to beat the market — but at higher cost","Minimum investments are common: often $1,000 to $3,000 to get started","Expense ratios average ~0.50% for index mutual funds and ~1.0% for active funds","Research consistently shows most active mutual funds underperform their benchmark index over 10+ years"],example:"Fidelity's Contrafund (FCNTX) charges 0.86% annually. On a $100,000 investment, that's $860/year in fees — vs. $4/year for a comparable index ETF.",relatedTerms:["etf","index-fund","expense-ratio","diversification"],learnMoreCourse:"investing-fundamentals"},"index-fund":{term:"Index Fund",simple:"An index fund is a type of investment that simply copies a market index — like the S&P 500. Instead of trying to beat the market, it aims to match it, at rock-bottom cost.",bullets:["Invented by Vanguard founder Jack Bogle in 1976; now manages trillions of dollars","Extremely low costs — Vanguard S&P 500 index fund charges just 0.03% per year","Proven outperformer: over 20 years, ~90% of actively managed funds underperform index funds","Automatic diversification — instantly own hundreds of companies with one purchase","Available as both mutual funds and ETFs"],example:"Warren Buffett famously advised most people to invest in a low-cost S&P 500 index fund and hold it forever — he even bet $1 million on it beating hedge funds over 10 years (and won).",videoTitle:"Why Index Funds Beat Most Investors",relatedTerms:["etf","mutual-fund","sp500","expense-ratio","diversification"],learnMoreCourse:"investing-fundamentals"},sp500:{term:"S&P 500",simple:"The S&P 500 is an index of the 500 largest publicly traded US companies. It is the most widely used measure of US stock market performance and a common benchmark for investors.",bullets:["Includes companies like Apple, Microsoft, Amazon, Google, and Berkshire Hathaway","Weighted by market cap — larger companies have a bigger impact on the index","Has returned approximately 10% annually on average since its inception in 1957","A new company must meet strict criteria to join: US-listed, $14.5B+ market cap, profitable for 4+ quarters","The index is maintained by S&P Dow Jones Indices, which rebalances it quarterly"],example:"If you had invested $10,000 in an S&P 500 index fund in 2000 and never touched it, it would be worth roughly $64,000 today — despite two major crashes along the way.",relatedTerms:["index-fund","etf","nasdaq","dow-jones","market-cap"],learnMoreCourse:"stock-market-101"},nasdaq:{term:"Nasdaq",simple:"The Nasdaq is a stock exchange and an index of technology and growth companies. The Nasdaq Composite includes over 3,000 mostly tech-focused companies.",bullets:["Home to Apple, Microsoft, Amazon, Tesla, Meta, and most major tech companies","More volatile than the S&P 500 — heavier concentration in high-growth sectors","The Nasdaq-100 (QQQ) tracks the 100 largest non-financial Nasdaq-listed companies","First electronic stock exchange — no physical trading floor","Suffered a devastating 78% crash during the dot-com bust (2000–2002), then recovered to new highs by 2015"],example:"During COVID lockdowns, Nasdaq surged 80% as people stayed home and used technology more. But when inflation hit in 2022, it fell 33% — showing its high-risk, high-reward nature.",relatedTerms:["sp500","dow-jones","stock","volatility","market-cap"],learnMoreCourse:"stock-market-101"},"dow-jones":{term:"Dow Jones Industrial Average",simple:'The Dow Jones (or "the Dow") tracks 30 of the largest and most influential US companies. It is the oldest and most recognized stock market index, though less comprehensive than the S&P 500.',bullets:["Created by Charles Dow in 1896 with just 12 companies","Includes blue-chip stocks: Apple, Goldman Sachs, Nike, Walmart, Disney, and 25 others","Price-weighted index (unlike the market-cap weighted S&P 500) — higher-priced stocks have more influence","Often cited in news headlines, but the S&P 500 is considered a better measure of the broad market",'When people say "the market was up 200 points today," they typically mean the Dow'],example:"In March 2020, the Dow dropped 37% in just 33 days — the fastest bear market in history. By August 2020 it had fully recovered, rewarding investors who held through the panic.",relatedTerms:["sp500","nasdaq","bull-market","bear-market"],learnMoreCourse:"stock-market-101"},"bull-market":{term:"Bull Market",simple:"A bull market is a period when stock prices are rising or expected to rise — typically defined as a 20% or greater gain from a recent low. Bulls charge forward, hence the name.",bullets:["Officially defined as a 20%+ rise from a bear market low","Characterized by strong economic growth, low unemployment, and investor optimism","The longest bull market in history ran from 2009 to 2020 — 131 months","Bull markets reward long-term investors who stay invested rather than trying to time the market","Can lead to overvaluation if investor enthusiasm outpaces actual company earnings growth"],example:"After the COVID crash of March 2020, a new bull market began that lasted until late 2021. Investors who stayed invested saw the S&P 500 more than double from its low point.",relatedTerms:["bear-market","volatility","sp500","market-cap","risk-tolerance"],learnMoreCourse:"stock-market-101"},"bear-market":{term:"Bear Market",simple:"A bear market is a period of falling stock prices, typically defined as a 20% or greater decline from a recent peak. Bears swipe downward, hence the name.",bullets:["Officially defined as a 20%+ decline from a recent peak lasting at least two months","The average bear market lasts about 9.5 months and sees stocks fall 36% on average","Often accompanied by recessions, rising unemployment, and investor fear","Since 1928, the US has experienced 26 bear markets — roughly one every 3.5 years","Historically, markets always recover and go on to reach new highs — patience is rewarded"],example:"The 2008 financial crisis bear market saw the S&P 500 drop 57% from peak to trough. However, an investor who held on from peak to the recovery recovered all losses by 2013.",relatedTerms:["bull-market","volatility","risk-tolerance","diversification","rebalancing"],learnMoreCourse:"stock-market-101"},volatility:{term:"Volatility",simple:"Volatility measures how dramatically an investment's price swings up and down. High volatility means big price moves; low volatility means steady, predictable prices.",bullets:['Measured statistically by standard deviation or by the VIX index (the "fear gauge")',"Short-term volatility is normal and should not trigger panic selling for long-term investors","Higher potential returns generally come with higher volatility — the risk-return tradeoff","Diversification reduces portfolio volatility without necessarily sacrificing long-term returns","A stock with 30% annual volatility might swing 30% in either direction in a year"],example:"Bitcoin has roughly 80% annualized volatility — it can double or halve in value within months. By contrast, a US Treasury bond fund has ~3% volatility, barely moving at all.",relatedTerms:["risk-tolerance","bear-market","bull-market","rsi","hedge"],learnMoreCourse:"risk-management"},"risk-tolerance":{term:"Risk Tolerance",simple:"Risk tolerance is your personal ability and willingness to endure investment losses in pursuit of higher long-term returns. It is shaped by your financial situation, time horizon, and psychology.",bullets:["Two components: capacity (can you afford to lose?) and willingness (can you stomach losses emotionally?)","Younger investors generally have higher risk tolerance — more time to recover from setbacks","Your true risk tolerance often reveals itself only when you actually experience losses","Overestimating risk tolerance leads to panic selling at market bottoms — locking in losses","Risk questionnaires help advisors tailor portfolio recommendations to individual investors"],example:"An investor with 30 years until retirement can tolerate a 50% portfolio drop — they have decades to recover. Someone retiring next year cannot, and should hold mostly bonds and cash.",relatedTerms:["volatility","asset-allocation","diversification","bear-market","portfolio"],learnMoreCourse:"risk-management"},rebalancing:{term:"Rebalancing",simple:"Rebalancing means periodically adjusting your portfolio back to your target allocation. As some investments grow faster than others, your original balanced mix gets skewed — rebalancing corrects this.",bullets:["Example: if stocks surge 40%, they might now be 70% of your portfolio instead of your target 60%","Rebalancing forces you to sell high (outperformers) and buy low (underperformers) — disciplined contrarianism","Typically done annually or when allocations drift more than 5% from targets","Tax-efficient rebalancing uses new contributions to buy underweight assets instead of selling","Robo-advisors like Betterment and Wealthfront rebalance automatically for you"],example:"After a strong stock market year, you sell 10% of your stock allocation and buy bonds to restore your 60/40 target. This locking-in-gains behavior improves long-term risk-adjusted returns.",relatedTerms:["asset-allocation","portfolio","tax-loss-harvesting","diversification"],learnMoreCourse:"portfolio-construction"},"capital-gains":{term:"Capital Gains",simple:"A capital gain is the profit you make when you sell an investment for more than you paid for it. The IRS taxes capital gains, but the rate depends on how long you held the investment.",bullets:["Short-term capital gains: held less than 1 year — taxed as ordinary income (up to 37%)","Long-term capital gains: held 1+ year — taxed at preferential rates (0%, 15%, or 20%)","Capital losses can be used to offset capital gains, reducing your tax bill","You only owe capital gains tax when you sell — unrealized gains grow tax-free","Tax-deferred accounts (401k, IRA) let you avoid capital gains taxes entirely while invested"],example:"You buy 100 shares of Apple at $150 and sell 18 months later at $210. Your gain is $6,000. Held long-term, you pay 15% tax = $900 in tax. Short-term would be $2,220 at 37%.",relatedTerms:["tax-loss-harvesting","dividend","rebalancing","stock"],learnMoreCourse:"wealth-management"},"tax-loss-harvesting":{term:"Tax-Loss Harvesting",simple:"Tax-loss harvesting is selling investments at a loss to offset taxable gains elsewhere, reducing your overall tax bill — while immediately reinvesting in a similar asset to stay invested.",bullets:["Can save 15–37% of the harvested loss amount, depending on your tax bracket",'The "wash sale" rule prevents buying the same or substantially identical security within 30 days',"Works best in taxable accounts — 401ks and IRAs are tax-deferred anyway","Robo-advisors often offer automated daily tax-loss harvesting","Losses carried forward can offset future gains indefinitely, up to $3,000/year against ordinary income"],example:"Your bond fund shows a $500 unrealized loss. You sell it, immediately buy a similar bond fund, and use the $500 loss to offset $500 of Apple stock gains — saving ~$75 in taxes at a 15% rate.",relatedTerms:["capital-gains","rebalancing","bond","expense-ratio"],learnMoreCourse:"wealth-management"},"expense-ratio":{term:"Expense Ratio",simple:"An expense ratio is the annual fee a fund charges to cover its operating costs, expressed as a percentage of assets. It is deducted automatically — you never write a check, but it silently reduces your returns.",bullets:["A 1% expense ratio on $100,000 costs you $1,000 per year","Index funds and ETFs typically charge 0.03% to 0.20%; actively managed funds charge 0.50% to 2%+","Compounded over time, a 1% vs 0.05% difference can cost tens of thousands of dollars","The expense ratio does not include trading commissions (now $0 at most brokers)","Morningstar research shows expense ratio is the single best predictor of future fund performance"],example:"Investing $10,000 over 30 years at 8% growth with a 1% expense ratio yields $76,123. The same investment with a 0.05% expense ratio yields $97,468 — a $21,000 difference from fees alone.",relatedTerms:["index-fund","etf","mutual-fund","yield"],learnMoreCourse:"investing-fundamentals"},"pe-ratio":{term:"P/E Ratio (Price-to-Earnings)",simple:"The P/E ratio shows how much investors are willing to pay for every $1 of a company's earnings. A high P/E suggests investors expect strong future growth; a low P/E may signal value or slower growth.",bullets:["Formula: Stock Price ÷ Earnings Per Share (EPS)","S&P 500 historical average P/E is about 16; currently elevated markets often trade at 20–25","Growth stocks (like tech) carry high P/E ratios (30–100+); value stocks trade at lower multiples","PEG ratio = P/E ÷ Growth Rate — adjusts for expected growth to compare across companies","Negative P/E means the company is losing money — useful for startups but hard to value traditionally"],example:"Apple earns $6.50 per share and trades at $210. P/E = 210 ÷ 6.50 = 32.3. Investors pay $32.30 for every $1 of Apple's earnings — a premium reflecting its brand and growth expectations.",relatedTerms:["earnings","stock","market-cap","rsi"],learnMoreCourse:"stock-market-101"},earnings:{term:"Earnings (EPS)",simple:"A company's earnings (profit) are what remain after all costs are paid. Earnings Per Share (EPS) divides this by the number of shares, showing how profitable each share is.",bullets:["Companies report earnings quarterly — these reports often cause big price movements","EPS = Net Income ÷ Shares Outstanding",'"Beating earnings" means reporting higher profit than analyst expectations — typically causes the stock to rise',"Forward EPS uses analyst estimates of future profits; trailing EPS uses past results","Earnings growth rate is a key driver of long-term stock price appreciation"],example:"NVIDIA reported Q1 2024 earnings of $5.98 EPS, beating the $5.59 estimate by 7%. The stock jumped 9% after hours as investors bet on continued AI-driven growth.",relatedTerms:["pe-ratio","stock","market-cap","ipo"],learnMoreCourse:"stock-market-101"},rsi:{term:"RSI (Relative Strength Index)",simple:"The RSI is a momentum indicator that measures how quickly and strongly a stock's price is moving. It ranges from 0 to 100 — readings above 70 suggest overbought; below 30 suggests oversold.",bullets:["Developed by J. Welles Wilder in 1978; one of the most widely used technical indicators","RSI > 70: stock may be overbought — potential pullback ahead","RSI < 30: stock may be oversold — potential rebound opportunity","Works best combined with other indicators; can stay overbought/oversold for extended periods in trending markets","Calculated using average gains vs. average losses over 14 periods (days, weeks, etc.)"],example:"NVIDIA's RSI hit 85 in early 2024 amid the AI frenzy — an overbought reading. Within weeks the stock pulled back 15% before resuming its uptrend, rewarding patient investors.",relatedTerms:["moving-average","golden-cross","death-cross","volatility"],learnMoreCourse:"advanced-derivatives"},"moving-average":{term:"Moving Average",simple:"A moving average smooths out price fluctuations by averaging closing prices over a specific time period. It helps identify the underlying trend, filtering out day-to-day noise.",bullets:["Simple Moving Average (SMA): equal weight to all periods","Exponential Moving Average (EMA): more weight on recent prices, faster to react","The 50-day and 200-day moving averages are the most widely watched by traders and institutions","When price is above its moving average, the trend is considered up; below = downtrend","Moving averages act as dynamic support and resistance levels"],example:"Apple's 50-day moving average at $195 acts as a support level. When the stock dips to $195, buyers often step in, expecting the trend to continue — creating a self-fulfilling price floor.",relatedTerms:["golden-cross","death-cross","rsi","volatility"],learnMoreCourse:"advanced-derivatives"},"golden-cross":{term:"Golden Cross",simple:"A golden cross is a bullish technical signal where a stock's short-term 50-day moving average crosses above its long-term 200-day moving average, suggesting upward momentum.",bullets:["Considered one of the strongest bullish signals in technical analysis","Historically, the S&P 500 has returned an average of 10%+ in the 12 months following a golden cross","Best used as a confirmation tool alongside fundamentals, not as a standalone buy signal","The 50/200-day crossover is the classic version; traders also use 10/50 day for shorter-term signals","The inverse — 50-day crossing below 200-day — is called a death cross (bearish)"],example:"Apple formed a golden cross in early 2023 when its 50-day MA crossed above the 200-day MA after months of decline. The stock rallied 35% over the following six months.",relatedTerms:["death-cross","moving-average","rsi","bull-market"],learnMoreCourse:"advanced-derivatives"},"death-cross":{term:"Death Cross",simple:"A death cross is a bearish technical signal where a stock's 50-day moving average crosses below its 200-day moving average, indicating that short-term momentum has turned negative.",bullets:["The opposite of the golden cross — often triggers institutional selling","Can be a lagging indicator — the price drop may already have occurred by the time it forms","The S&P 500 formed a death cross in March 2022, preceding a 14% further decline","More reliable as a signal when accompanied by rising volume","Not a guarantee of further declines — false signals do occur, especially in choppy sideways markets"],example:"The Nasdaq formed a death cross in February 2022. Over the next 8 months, the index fell an additional 25%, from 14,000 to below 11,000, validating the warning signal.",relatedTerms:["golden-cross","moving-average","bear-market","rsi"],learnMoreCourse:"advanced-derivatives"},liquidity:{term:"Liquidity",simple:"Liquidity describes how quickly and easily you can convert an investment to cash without significantly affecting its price. Cash is perfectly liquid; a rental property is highly illiquid.",bullets:["Stocks in large companies are highly liquid — you can sell billions of dollars in minutes","Real estate, private equity, and collectibles are illiquid — sales take weeks or months",'Illiquid investments often offer higher returns as compensation (the "liquidity premium")',"A liquidity crisis occurs when many investors need cash simultaneously — fire sales ensue","Market liquidity vs. funding liquidity: market = ease of trading assets; funding = ability to borrow"],example:"During the 2008 crisis, mortgage-backed securities became illiquid overnight — no one would buy them at any price, forcing banks to mark them to near zero and triggering the financial collapse.",relatedTerms:["bond","stock","etf","risk-tolerance"],learnMoreCourse:"risk-management"},hedge:{term:"Hedge",simple:"A hedge is an investment made specifically to offset potential losses in another investment. It is like insurance for your portfolio — you pay a small premium to limit downside exposure.",bullets:["Common hedging tools: options (puts), inverse ETFs, gold, and Treasury bonds","Perfect hedges eliminate all risk but also all upside — most investors use partial hedges","Hedge funds are named for their use of hedging strategies, though many now take aggressive directional bets","Currency hedging protects international investments from exchange rate fluctuations","Hedging always has a cost — either directly (option premiums) or in reduced upside"],example:"You own $100,000 in S&P 500 stocks. You buy put options giving you the right to sell at current prices for $500. If the market falls 20%, your options profit covers much of the loss.",relatedTerms:["volatility","risk-tolerance","short-selling","diversification"],learnMoreCourse:"risk-management"},"short-selling":{term:"Short Selling",simple:"Short selling is borrowing shares and immediately selling them, hoping to buy them back cheaper later and pocket the difference. It is a bet that a stock's price will fall.",bullets:["Short sellers borrow shares from their broker and sell them in the open market","If the stock falls, they buy shares back cheaper and return them — keeping the difference","Risk is theoretically unlimited — a stock can rise infinitely but can only fall to zero","Short interest as a % of float is a sentiment indicator — very high short interest can fuel short squeezes","GameStop (2021) was a famous short squeeze: retail investors bought en masse, forcing shorts to cover at massive losses"],example:"You short 100 shares of a stock at $50, borrowing and selling for $5,000. It falls to $30. You buy 100 shares for $3,000 and return them — pocketing $2,000 profit minus borrowing costs.",relatedTerms:["hedge","volatility","margin","stock"],learnMoreCourse:"advanced-derivatives"},margin:{term:"Margin",simple:"Trading on margin means borrowing money from your broker to buy more investments than you could with your own cash. It amplifies both gains and losses — a double-edged sword.",bullets:["Reg T allows US investors to borrow up to 50% of a position's purchase price","Margin interest is charged on the borrowed amount — typically 6–12% annually",'A "margin call" occurs when losses reduce your account below the maintenance minimum — you must add cash or sell positions immediately',"Margin magnifies returns in bull markets but can wipe out entire accounts in downturns","Only appropriate for experienced investors with high risk tolerance and short time horizons"],example:"With $10,000 and 2:1 margin, you buy $20,000 of stock. It rises 20% to $24,000. Your gain is $4,000 on $10,000 invested = 40% return. But if it falls 20% to $16,000, you've lost $4,000 = 40% loss.",relatedTerms:["short-selling","risk-tolerance","hedge","volatility"],learnMoreCourse:"advanced-derivatives"},ipo:{term:"IPO (Initial Public Offering)",simple:"An IPO is when a private company sells shares to the public on a stock exchange for the first time. It allows the company to raise capital and lets early investors cash out.",bullets:["Companies hire investment banks (underwriters) to set the IPO price and market the offering",'Most IPOs are underpriced — first-day "pops" average 15–20% historically',"Lock-up periods (typically 6 months) prevent insiders from selling immediately after the IPO","SPACs (blank-check companies) offer an alternative route to going public","Famous IPOs: Google ($85 in 2004, now $175+), Facebook ($38 in 2012), Uber ($45 in 2019)"],example:"When Airbnb went public in December 2020 at $68/share, it rose 113% on day one to $146. Early venture investors who bought in at $1/share in 2009 made 146× their money.",relatedTerms:["stock","sec-filing","market-cap","earnings"],learnMoreCourse:"stock-market-101"},"sec-filing":{term:"SEC Filing",simple:"SEC filings are official documents public companies must submit to the Securities and Exchange Commission. They provide investors with key financial data — required by law to be accurate and complete.",bullets:["10-K: annual report with full financial statements, business overview, and risk factors","10-Q: quarterly financial update — filed 3 times per year",'8-K: "material event" disclosure — earnings, mergers, CEO departures, any major news',"S-1: IPO registration statement — the first public look at a company's financials","All filings are publicly available on the SEC's EDGAR database at sec.gov"],example:"Before investing, many professionals read the annual 10-K filing. It includes management's honest assessment of risks — sometimes buried in footnotes are warnings about problems the company faces.",relatedTerms:["ipo","earnings","stock","pe-ratio"],learnMoreCourse:"stock-market-101"},"monetary-policy":{term:"Monetary Policy",simple:"Monetary policy refers to how a central bank (like the Federal Reserve) manages the money supply and interest rates to influence economic growth, employment, and inflation.",bullets:["Expansionary (loose) policy: lower rates + more money supply to stimulate growth","Contractionary (tight) policy: higher rates + less money supply to fight inflation","Primary tool: the federal funds rate — the overnight lending rate between banks","Secondary tools: quantitative easing, reserve requirements, forward guidance","Monetary policy affects all assets: stocks, bonds, real estate, currencies, and commodities"],example:"After COVID-19, the Fed cut rates to near 0% and pumped trillions into the economy. This fueled a massive bull market in stocks and real estate — a textbook expansionary monetary policy response.",relatedTerms:["federal-reserve","interest-rates","quantitative-easing","inflation","bond"],learnMoreCourse:"markets-101"},"quantitative-easing":{term:"Quantitative Easing (QE)",simple:"Quantitative easing is when a central bank creates new money to buy financial assets (mainly government bonds), injecting cash into the financial system to stimulate lending and investment.",bullets:["Used when traditional rate cuts (to near 0%) are no longer sufficient to stimulate the economy","The Fed purchased over $8 trillion in assets since 2008 through various QE programs","QE lowers long-term interest rates and tends to boost stock and real estate prices","The reverse — quantitative tightening (QT) — shrinks the central bank's balance sheet","Critics worry QE inflates asset bubbles and disproportionately benefits wealthy investors"],example:"During the 2020 pandemic, the Fed launched $4 trillion in QE — buying $80 billion in Treasury bonds per month. This kept borrowing costs low and fueled the fastest stock market recovery in history.",relatedTerms:["federal-reserve","monetary-policy","interest-rates","inflation","bond"],learnMoreCourse:"markets-101"}};function tB({termKey:e,onClose:t}){const{openTerm:n}=jn(),r=e?Ww[e]:null;return T.useEffect(()=>(r?docu rget."}]},{type:"paragraph",segments:[{type:"text",content:'Fed Chair Jerome Powell said progress on inflation had "stalled" in recent months, pushing back against market expectations for imminent rate cuts. "We need greater confidence that inflation is moving sustainably toward 2% before it would be appropriate to ease '},{type:"term",word:"monetary policy",termKey:"monetary-policy"},{type:"text",content:'," Powell told reporters at the post-meeting press conference. Futures markets, which had priced in three rate cuts for 2024, immediately repriced to fewer than two.'}]},{type:"paragraph",segments:[{type:"text",content:"The decision sent "},{type:"term",word:"bond",termKey:"bond"},{type:"text",content:" yields higher, with the 10-year Treasury briefly touching 4.65% — its highest level this year. Rising yields weighed on growth stocks, pushing the "},{type:"term",word:"Nasdaq",termKey:"nasdaq"},{type:"text",content:" down 1.2% in afternoon trading. The "},{type:"term",word:"S&P 500",termKey:"sp500"},{type:"text",content:" fell 0.6% as investors recalibrated return expectations for equity markets. The "},{type:"term",word:"yield",termKey:"yield"},{type:"text",content:" on 2-year Treasuries, most sensitive to Fed policy, rose 8 "},{type:"term",word:"basis points",termKey:"basis-points"},{type:"text",content:" to 4.98%."}]},{type:"paragraph",segments:[{type:"text",content:"The decision highlights the delicate balancing act facing the Fed. Its dual mandate requires maximizing employment while maintaining price stability. With the labor market still adding over 200,000 jobs per month, there is little urgency to cut rates to stimulate growth. However, prolonged high rates risk slowing the economy into recession — a scenario policymakers are keen to avoid. The Fed's next scheduled FOMC meeting is in six weeks, with most economists expecting the first rate cut no earlier than September."}]}]},{id:"nvidia-earnings-blowout",headline:"NVIDIA Shatters Earnings Expectations Again, Announces $10B Buyback",source:"Wall Street Journal",time:"5 hours ago",category:"Company",readTime:"5 min read",summary:"NVIDIA reported Q1 revenue of $26 billion, up 262% year-over-year, as AI chip demand remains insatiable across cloud hyperscalers.",body:[{type:"paragraph",segments:[{type:"text",content:"NVIDIA Corp. reported first-quarter "},{type:"term",word:"earnings",termKey:"earnings"},{type:"text",content:" of $6.12 per share on Wednesday, obliterating analyst estimates of $5.59 and extending a streak of record-breaking quarters driven by relentless demand for its AI accelerator chips. Revenue surged 262% year-over-year to $26 billion, with data center revenue alone hitting $22.6 billion."}]},{type:"paragraph",segments:[{type:"text",content:"The results reinforced NVIDIA's position as the primary beneficiary of the artificial intelligence infrastructure buildout. The company's "},{type:"term",word:"market cap",termKey:"market-cap"},{type:"text",content:` surged past $2.5 trillion in after-hours trading, briefly making it the world's second most valuable company. CEO Jensen Huang said demand for the company's Blackwell GPU architecture "is insane" and that production constraints remain the only limit on growth.`}]},{type:"paragraph",segments:[{type:"text",content:"NVIDIA also announced a $10 billion share "},{type:"term",word:"buyback",termKey:"capital-gains"},{type:"text",content:" program and raised its quarterly "},{type:"term",word:"dividend",termKey:"dividend"},{type:"text",content:" by 150%. The stock's "},{type:"term",word:"P/E ratio",termKey:"pe-ratio"},{type:"text",content:" now stands at 72x trailing earnings — a premium multiple that reflects the market's extraordinary growth expectations. Some analysts warn that even at 72x, NVIDIA's "},{type:"term",word:"volatility",termKey:"volatility"},{type:"text",content:" remains elevated and any sign of slowing AI spending could trigger a sharp correction."}]},{type:"paragraph",segments:[{type:"text",content:"Technical analysts noted NVIDIA's stock remains above both its 50-day and 200-day "},{type:"term",word:"moving averages",termKey:"moving-average"},{type:"text",content:", maintaining the "},{type:"term",word:"golden cross",termKey:"golden-cross"},{type:"text",content:" pattern that has been in place since January. However, the "},{type:"term",word:"RSI",termKey:"rsi"},{type:"text",content:" has climbed to 78 — firmly in overbought territory — raising caution flags for short-term traders even as long-term fundamentals remain compelling."}]}]},{id:"cpi-inflation-data",headline:"April CPI Comes in Hot at 3.5%, Dashing Rate-Cut Hopes",source:"Bloomberg",time:"8 hours ago",category:"Economy",readTime:"4 min read",summary:"Consumer prices rose 3.5% year-over-year in March, above the 3.2% forecast, driven by persistent services inflation and higher energy costs.",body:[{type:"paragraph",segments:[{type:"text",content:"The Bureau of Labor Statistics reported that the Consumer Price Index (CPI) rose 3.5% year-over-year in March, beating economist forecasts of 3.2% and accelerating from February's 3.2% reading. The surprise to the upside immediately triggered a repricing in rate markets, with traders eliminating bets on a June "},{type:"term",word:"Federal Reserve",termKey:"federal-reserve"},{type:"text",content:" cut entirely."}]},{type:"paragraph",segments:[{type:"text",content:"Core "},{type:"term",word:"inflation",termKey:"inflation"},{type:"text",content:" — which strips out volatile food and energy prices — rose 3.8%, also above forecasts. Services inflation, driven by shelter costs and insurance premiums, proved particularly stubborn. The data challenges the Fed's narrative that "},{type:"term",word:"monetary policy",termKey:"monetary-policy"},{type:"text",content:" is sufficiently restrictive to bring inflation back to the 2% target without triggering a recession."}]},{type:"paragraph",segments:[{type:"text",content:"Markets reacted sharply. The "},{type:"term",word:"S&P 500",termKey:"sp500"},{type:"text",content:" fell 1.2%, its worst day in six weeks. "},{type:"term",word:"Bond",termKey:"bond"},{type:"text",content:" yields spiked as prices fell — a reminder that inflation erodes the fixed payments bonds provide. The 10-year Treasury yield jumped 18 "},{type:"term",word:"basis points",termKey:"basis-points"},{type:"text",content:" to 4.56%, its highest level since November. The inflation-adjusted (real) "},{type:"term",word:"yield",termKey:"yield"},{type:"text",content:" on Treasury Inflation-Protected Securities (TIPS) also rose, reflecting tighter financial conditions."}]},{type:"paragraph",segments:[{type:"text",content:"For long-term investors, sustained elevated inflation presents a clear challenge to "},{type:"term",word:"portfolio",termKey:"portfolio"},{type:"text",content:" construction. Traditional 60/40 "},{type:"term",word:"asset allocation",termKey:"asset-allocation"},{type:"text",content:" strategies suffer when both stocks and bonds fall simultaneously — a phenomenon that plagued investors in 2022 when the Fed hiked "},{type:"term",word:"interest rates",termKey:"interest-rates"},{type:"text",content:" aggressively. Commodity exposure, real estate, and inflation-linked bonds offer potential "},{type:"term",word:"hedges",termKey:"hedge"},{type:"text",content:" against continued price pressures."}]}]},{id:"sp500-record-high",headline:"S&P 500 Hits Record 5,300 as Earnings Season Exceeds Expectations",source:"Reuters",time:"1 day ago",category:"Markets",readTime:"3 min read",summary:"The S&P 500 index closed at a new all-time high as 78% of reporting companies beat earnings estimates, fueling the ongoing bull market.",body:[{type:"paragraph",segments:[{type:"text",content:"The "},{type:"term",word:"S&P 500",termKey:"sp500"},{type:"text",content:" closed at a record 5,308 on Thursday, propelled by stronger-than-expected corporate "},{type:"term",word:"earnings",termKey:"earnings"},{type:"text",content:" and renewed optimism about artificial intelligence's impact on productivity growth. The "},{type:"term",word:"bull market",termKey:"bull-market"},{type:"text",content:", now 17 months old, has delivered a 52% gain from its October 2022 lows — well above the historical average for bull market cycles."}]},{type:"paragraph",segments:[{type:"text",content:"With 78% of S&P 500 companies having reported Q1 results, earnings per share are tracking 8% above analyst estimates — the highest beat rate in three years. Technology and communication services sectors led gains, while the "},{type:"term",word:"Dow Jones",termKey:"dow-jones"},{type:"text",content:" added 214 points and the "},{type:"term",word:"Nasdaq",termKey:"nasdaq"},{type:"text",content:" rose 1.4%. The broad market strength has pushed the S&P 500's forward "},{type:"term",word:"P/E ratio",termKey:"pe-ratio"},{type:"text",content:" to 21.3x — above the 10-year average of 17.8x — prompting valuation concerns among some strategists."}]},{type:"paragraph",segments:[{type:"text",content:"The record close marks a significant milestone for investors who stayed invested through the brutal 2022 "},{type:"term",word:"bear market",termKey:"bear-market"},{type:"text",content:", when rising "},{type:"term",word:"interest rates",termKey:"interest-rates"},{type:"text",content:" and inflation fears drove a 25% peak-to-trough decline. Investors who practiced disciplined "},{type:"term",word:"rebalancing",termKey:"rebalancing"},{type:"text",content:" and bought "},{type:"term",word:"index funds",termKey:"index-fund"},{type:"text",content:" during the downturn have seen outsized returns, reinforcing the long-term case for passive investing."}]}]},{id:"bond-market-volatility",headline:"Bond Markets Face Biggest Selloff in Months as Rate-Cut Timeline Extends",source:"Financial Times",time:"2 days ago",category:"Markets",readTime:"4 min read",summary:"Treasury bonds experienced sharp losses as traders pushed rate-cut expectations to late 2024, causing significant mark-to-market losses in fixed income portfolios.",body:[{type:"paragraph",segments:[{type:"text",content:"The US "},{type:"term",word:"bond",termKey:"bond"},{type:"text",content:" market suffered its worst week in four months as stronger-than-expected economic data prompted traders to push back their expectations for "},{type:"term",word:"Federal Reserve",termKey:"federal-reserve"},{type:"text",content:" rate cuts. The benchmark 10-year Treasury "},{type:"term",word:"yield",termKey:"yield"},{type:"text",content:" surged 22 "},{type:"term",word:"basis points",termKey:"basis-points"},{type:"text",content:" over five days to 4.68%, its highest level since late November — and a stark reminder that fixed income carries meaningful price risk."}]},{type:"paragraph",segments:[{type:"text",content:"The selloff illustrates the inverse relationship between bond prices and "},{type:"term",word:"interest rates",termKey:"interest-rates"},{type:"text",content:": when yields rise, the price of existing bonds falls. Long-duration Treasury bonds fell over 3% in price terms — losses that erased months of coupon income for holders. Total "},{type:"term",word:"portfolio",termKey:"portfolio"},{type:"text",content:" losses in the $27 trillion Treasury market exceeded $400 billion in mark-to-market terms."}]},{type:"paragraph",segments:[{type:"text",content:"For investors who hold bonds as a "},{type:"term",word:"hedge",termKey:"hedge"},{type:"text",content:" against equity "},{type:"term",word:"volatility",termKey:"volatility"},{type:"text",content:", the simultaneous declines in both stocks and bonds echo the painful 2022 experience. The traditional 60/40 "},{type:"term",word:"asset allocation",termKey:"asset-allocation"},{type:"text",content:" strategy lost 16% that year — its worst performance since 1937. Some strategists argue the era of bonds acting as reliable portfolio insurance may be challenged in a persistently elevated "},{type:"term",word:"inflation",termKey:"inflation"},{type:"text",content:" environment."}]},{type:"paragraph",segments:[{type:"text",content:"Despite the near-term pain, long-term investors may find opportunity in the selloff. The "},{type:"term",word:"expense ratio",termKey:"expense-ratio"},{type:"text",content:" on bond "},{type:"term",word:"ETFs",termKey:"etf"},{type:"text",content:" remains near historic lows, and the higher yields available today mean bonds now offer their most compelling income in 15 years. Investors willing to tolerate short-term price "},{type:"term",word:"volatility",termKey:"volatility"},{type:"text",content:" can lock in attractive "},{type:"term",word:"yields",termKey:"yield"},{type:"text",content:" that meaningfully improve portfolio income generation."}]}]},{id:"tech-sector-ai-rally",headline:"AI Euphoria Drives Tech Sector to 38% YTD Gain — Bubble or New Paradigm?",source:"Bloomberg",time:"3 days ago",category:"Macro",readTime:"5 min read",summary:"The technology sector has surged 38% year-to-date, outpacing every other S&P 500 sector by a wide margin as AI spending forecasts continue to climb.",body:[{type:"paragraph",segments:[{type:"text",content:"Technology stocks have surged 38% year-to-date, making the sector's weighting in the "},{type:"term",word:"S&P 500",termKey:"sp500"},{type:"text",content:' the highest since the dot-com era at 31%. The AI-driven rally has produced extraordinary gains for a concentrated group of companies — the so-called "Magnificent Seven" — whose combined '},{type:"term",word:"market cap",termKey:"market-cap"},{type:"text",content:" now exceeds $13 trillion. The "},{type:"term",word:"Nasdaq",termKey:"nasdaq"},{type:"text",content:" has outperformed the broader "},{type:"term",word:"Dow Jones",termKey:"dow-jones"},{type:"text",content:" by 22 percentage points so far this year."}]},{type:"paragraph",segments:[{type:"text",content:"The concentration debate cuts to the heart of "},{type:"term",word:"diversification",termKey:"diversification"},{type:"text",content:" theory. While index investors in "},{type:"term",word:"S&P 500 index funds",termKey:"index-fund"},{type:"text",content:" have benefited enormously from the tech rally — the largest companies now compose 30%+ of the index — this same concentration creates significant downside "},{type:"term",word:"risk",termKey:"risk-tolerance"},{type:"text",content:". If AI spending disappoints or regulatory headwinds emerge, the index has more downside sensitivity than in previous decades."}]},{type:"paragraph",segments:[{type:"text",content:"The sector's elevated "},{type:"term",word:"P/E ratio",termKey:"pe-ratio"},{type:"text",content:" of 34x — double the "},{type:"term",word:"S&P 500",termKey:"sp500"},{type:"text",content:" average — echoes the 1999 tech bubble when valuations disconnected from fundamental "},{type:"term",word:"earnings",termKey:"earnings"},{type:"text",content:" power. Bulls counter that unlike 1999, today's tech giants are enormously profitable. NVIDIA's operating margin exceeds 60%; Apple generates more "},{type:"term",word:"dividend",termKey:"dividend"},{type:"text",content:" and buyback capacity than most countries' GDPs."}]},{type:"paragraph",segments:[{type:"text",content:"Technical indicators show mixed signals for tech investors. The sector's "},{type:"term",word:"RSI",termKey:"rsi"},{type:"text",content:" sits at 71 — just above overbought territory. Several mega-cap stocks have maintained their "},{type:"term",word:"golden cross",termKey:"golden-cross"},{type:"text",content:" formations, suggesting underlying trend strength, but momentum indicators warn of possible near-term consolidation. For investors concerned about concentration, equal-weight S&P 500 "},{type:"term",word:"ETFs",termKey:"etf"},{type:"text",content:" offer exposure to the same 500 companies with far less tech concentration — though at the cost of underperforming in AI-driven bull markets."}]}]}];function Gj(e){var t,n,r="";if(typeof e=="string"||typeo
